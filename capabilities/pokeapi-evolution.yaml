naftiko: 1.0.0-alpha2
info:
  label: "Pok\xE9API \u2014 Evolution"
  description: "Pok\xE9API Evolution capability. 3 read-only operations covering the evolution resource family."
  tags:
  - "Pok\xE9API"
  - Evolution
  created: '2026-05-30'
  modified: '2026-05-30'
capability:
  consumes:
  - type: http
    namespace: pokeapi-evolution
    baseUri: https://pokeapi.co/api/v2
    description: "Pok\xE9API Evolution business capability. Self-contained, no shared references."
    resources:
    - name: pokeapi-evolution-chain-id
      path: /evolution-chain/{id}
      operations:
      - name: getevolutionchain
        method: GET
        description: Get Evolution Chain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Resource id (integer only).
    - name: pokeapi-evolution-trigger
      path: /evolution-trigger
      operations:
      - name: listevolutiontriggers
        method: GET
        description: List Evolution Triggers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Number of items to return per page.
        - name: offset
          in: query
          type: integer
          description: Number of items to skip before starting to collect the result set.
    - name: pokeapi-evolution-trigger-id
      path: /evolution-trigger/{id}
      operations:
      - name: getevolutiontrigger
        method: GET
        description: Get Evolution Trigger
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Resource id (integer) or name (slug).
    authentication:
      type: none
  exposes:
  - type: rest
    namespace: pokeapi-evolution-rest
    port: 8080
    description: "REST adapter for Pok\xE9API Evolution."
    resources:
    - path: /v1/evolution-chain/{id}
      name: pokeapi-evolution-chain-id
      description: REST surface for pokeapi-evolution-chain-id.
      operations:
      - method: GET
        name: getevolutionchain
        description: Get Evolution Chain
        call: pokeapi-evolution.getevolutionchain
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/evolution-trigger
      name: pokeapi-evolution-trigger
      description: REST surface for pokeapi-evolution-trigger.
      operations:
      - method: GET
        name: listevolutiontriggers
        description: List Evolution Triggers
        call: pokeapi-evolution.listevolutiontriggers
        with:
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/evolution-trigger/{id}
      name: pokeapi-evolution-trigger-id
      description: REST surface for pokeapi-evolution-trigger-id.
      operations:
      - method: GET
        name: getevolutiontrigger
        description: Get Evolution Trigger
        call: pokeapi-evolution.getevolutiontrigger
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pokeapi-evolution-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Pok\xE9API Evolution."
    tools:
    - name: pokeapi-getevolutionchain
      description: Get Evolution Chain
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pokeapi-evolution.getevolutionchain
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: pokeapi-listevolutiontriggers
      description: List Evolution Triggers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pokeapi-evolution.listevolutiontriggers
      with:
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: pokeapi-getevolutiontrigger
      description: Get Evolution Trigger
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pokeapi-evolution.getevolutiontrigger
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
